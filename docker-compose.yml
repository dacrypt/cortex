version: "3.8"

services:
  tika:
    image: apache/tika:latest
    container_name: cortex-tika
    ports:
      - "9998:9998"
    command: ["java", "-jar", "/tika-server-standard.jar", "--host=0.0.0.0", "--port=9998"]
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9998/tika"]
      interval: 30s
      timeout: 10s
      retries: 3
    restart: unless-stopped

