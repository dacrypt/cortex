syntax = "proto3";

package cortex.v1;

option go_package = "github.com/dacrypt/cortex/backend/api/gen/cortex/v1;cortexv1";

// ClusteringService provides document graph and community detection operations.
// Inspired by D2CS and GraphRAG papers.
service ClusteringService {
  // GetClusters returns all clusters for a workspace.
  rpc GetClusters(GetClustersRequest) returns (stream DocumentCluster);

  // GetCluster returns a specific cluster by ID.
  rpc GetCluster(GetClusterRequest) returns (DocumentCluster);

  // GetClusterMembers returns all members of a cluster.
  rpc GetClusterMembers(GetClusterMembersRequest) returns (stream ClusterMember);

  // GetDocumentGraph returns the document graph for visualization.
  rpc GetDocumentGraph(GetDocumentGraphRequest) returns (DocumentGraphData);

  // GetDocumentClusters returns all clusters a document belongs to.
  rpc GetDocumentClusters(GetDocumentClustersRequest) returns (stream ClusterMembership);

  // RunClustering triggers clustering analysis for a workspace.
  rpc RunClustering(RunClusteringRequest) returns (ClusteringResult);

  // MergeClusters combines two clusters into one.
  rpc MergeClusters(MergeClustersRequest) returns (ClusteringResult);

  // DisbandCluster removes a cluster, keeping documents unassigned.
  rpc DisbandCluster(DisbandClusterRequest) returns (ClusteringResult);

  // GetClusterStats returns clustering statistics for a workspace.
  rpc GetClusterStats(GetClusterStatsRequest) returns (ClusterStats);
}

// GetClustersRequest requests all clusters for a workspace.
message GetClustersRequest {
  string workspace_id = 1;
  ClusterStatus status_filter = 2;  // Optional: filter by status
  int32 limit = 3;
  int32 offset = 4;
}

// GetClusterRequest requests a specific cluster.
message GetClusterRequest {
  string workspace_id = 1;
  string cluster_id = 2;
}

// GetClusterMembersRequest requests members of a cluster.
message GetClusterMembersRequest {
  string workspace_id = 1;
  string cluster_id = 2;
  int32 limit = 3;
  int32 offset = 4;
}

// GetDocumentGraphRequest requests the document graph.
message GetDocumentGraphRequest {
  string workspace_id = 1;
  double min_edge_weight = 2;  // Filter edges below this weight
  repeated string edge_types = 3;  // Filter by edge types (semantic, temporal, entity, structural)
  int32 max_nodes = 4;  // Limit nodes for performance
}

// GetDocumentClustersRequest requests clusters for a document.
message GetDocumentClustersRequest {
  string workspace_id = 1;
  string document_id = 2;
}

// RunClusteringRequest triggers clustering.
message RunClusteringRequest {
  string workspace_id = 1;
  bool force_rebuild = 2;  // Rebuild even if recent clusters exist
  ClusteringConfig config = 3;  // Optional config overrides
}

// MergeClustersRequest merges two clusters.
message MergeClustersRequest {
  string workspace_id = 1;
  string target_cluster_id = 2;  // Cluster to merge into
  string source_cluster_id = 3;  // Cluster to merge from
  string new_name = 4;  // Optional: new name for merged cluster
}

// DisbandClusterRequest removes a cluster.
message DisbandClusterRequest {
  string workspace_id = 1;
  string cluster_id = 2;
}

// GetClusterStatsRequest requests statistics.
message GetClusterStatsRequest {
  string workspace_id = 1;
}

// ClusterStatus defines cluster lifecycle states.
enum ClusterStatus {
  CLUSTER_STATUS_UNKNOWN = 0;
  CLUSTER_STATUS_PENDING = 1;     // Created but not validated
  CLUSTER_STATUS_VALIDATED = 2;   // LLM validated
  CLUSTER_STATUS_ACTIVE = 3;      // Active and visible to users
  CLUSTER_STATUS_MERGED = 4;      // Merged into another cluster
  CLUSTER_STATUS_DISBANDED = 5;   // Manually disbanded
}

// DocumentCluster represents a group of related documents.
message DocumentCluster {
  string id = 1;
  string workspace_id = 2;
  string name = 3;
  string summary = 4;  // GraphRAG-style summary
  ClusterStatus status = 5;
  double confidence = 6;  // Cluster cohesion score 0-1
  int32 member_count = 7;
  repeated string central_nodes = 8;  // Representative document IDs
  repeated string top_entities = 9;
  repeated string top_keywords = 10;
  int64 created_at = 11;
  int64 updated_at = 12;
  string project_id = 13;  // Associated project if created
}

// ClusterMember represents a document in a cluster.
message ClusterMember {
  string document_id = 1;
  string relative_path = 2;
  string filename = 3;
  double membership_score = 4;  // How strongly it belongs 0-1
  bool is_central = 5;  // Is a central/representative node
  int64 added_at = 6;
}

// ClusterMembership represents a document's membership in a cluster.
message ClusterMembership {
  string cluster_id = 1;
  string cluster_name = 2;
  double score = 3;
  bool is_central = 4;
}

// DocumentGraphData contains the full graph for visualization.
message DocumentGraphData {
  repeated ClusterNode nodes = 1;
  repeated ClusterEdge edges = 2;
  map<string, string> metadata = 3;  // Graph-level metadata
  int32 total_nodes = 4;
  int32 total_edges = 5;
}

// ClusterNode represents a node in the cluster graph.
message ClusterNode {
  string id = 1;
  string label = 2;  // Display label (filename)
  string node_type = 3;  // "document", "cluster", "project"
  string cluster_id = 4;  // Which cluster it belongs to
  double x = 5;  // Optional: pre-computed layout position
  double y = 6;
  map<string, string> properties = 7;  // Additional properties
}

// ClusterEdge represents an edge between nodes in the cluster graph.
message ClusterEdge {
  string from_id = 1;
  string to_id = 2;
  string edge_type = 3;  // "semantic", "temporal", "entity", "structural"
  double weight = 4;  // Edge strength 0-1
  string detail = 5;  // e.g., entity name, time window
}

// ClusteringConfig allows customizing clustering behavior.
message ClusteringConfig {
  double semantic_weight = 1;  // Weight for semantic similarity (default 0.4)
  double entity_weight = 2;    // Weight for shared entities (default 0.3)
  double temporal_weight = 3;  // Weight for co-occurrence (default 0.2)
  double structural_weight = 4; // Weight for folder proximity (default 0.1)
  int32 min_cluster_size = 5;   // Minimum documents per cluster
  double min_edge_weight = 6;   // Minimum edge weight to consider
  bool auto_create_projects = 7; // Create projects from clusters
  double auto_assign_threshold = 8; // Auto-assign if confidence above
}

// ClusteringResult represents the result of a clustering operation.
message ClusteringResult {
  bool success = 1;
  string message = 2;
  int32 clusters_created = 3;
  int32 clusters_updated = 4;
  int32 documents_assigned = 5;
  int32 projects_created = 6;
  repeated string errors = 7;
  int64 duration_ms = 8;
}

// ClusterStats provides statistics about clustering.
message ClusterStats {
  int32 total_clusters = 1;
  int32 active_clusters = 2;
  int32 documents_clustered = 3;
  int32 documents_unclustered = 4;
  double avg_cluster_size = 5;
  double avg_cluster_confidence = 6;
  int64 last_clustering_at = 7;
}
